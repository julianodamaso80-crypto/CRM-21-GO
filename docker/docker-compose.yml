version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_database
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm_user']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # Redis (Cache + Queues)
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: crm-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - crm-network

  # Backend (Node.js + Fastify)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: crm-backend
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgresql://crm_user:crm_password@postgres:5432/crm_database?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:3333
      CORS_ORIGIN: http://localhost:5173
      AI_SERVICE_URL: http://ai-service:8100
    ports:
      - '3333:3333'
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-network

  # AI Service (Python + FastAPI + Agno + ChromaDB)
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: crm-ai-service
    environment:
      HOST: 0.0.0.0
      PORT: 8100
      DEBUG: 'true'
      JWT_SECRET: ${JWT_SECRET:-development-secret-key-min-32-chars-long}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      DEFAULT_AI_PROVIDER: openai
      CHROMA_PERSIST_DIR: /data/chroma
      FASTIFY_BACKEND_URL: http://backend:3333
    ports:
      - '8100:8100'
    volumes:
      - ../ai-service:/app
      - /app/__pycache__
      - chroma_data:/data/chroma
    networks:
      - crm-network

  # Frontend (React + Vite)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: crm-frontend
    environment:
      VITE_API_URL: http://localhost:3333
    ports:
      - '5173:5173'
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - crm-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  chroma_data:

networks:
  crm-network:
    driver: bridge
